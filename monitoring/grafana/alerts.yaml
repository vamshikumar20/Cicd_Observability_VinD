apiVersion: 1
groups:
  - name: payment-app-alerts
    rules:
      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total{namespace="payment-app"}[5m])) by (pod) > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High CPU usage on pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} has been using more than 80% CPU for the last 5 minutes."
      
      - alert: HighInternalServerErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (service) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on service {{ $labels.service }}"
          description: "Service {{ $labels.service }} has a 5xx error rate higher than 5% for the last 2 minutes."

# Slack Integration (Grafana Alerting Contact Point)
contactPoints:
  - name: slack-notifications
    receivers:
      - type: slack
        settings:
          url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
          recipient: "#alerts"
          title: "{{ .CommonAnnotations.summary }}"
          text: "{{ .CommonAnnotations.description }}"
