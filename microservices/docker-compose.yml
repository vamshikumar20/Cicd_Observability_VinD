version: '3.8'

services:
  user-service:
    build: ./user-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  payment-gateway-service:
    build: ./payment-gateway-service
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  transaction-service:
    build: ./transaction-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  fraud-detection-service:
    build: ./fraud-detection-service
    ports:
      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  notification-service:
    build: ./notification-service
    ports:
      - "8085:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  reporting-service:
    build: ./reporting-service
    ports:
      - "8086:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
