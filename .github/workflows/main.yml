name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, payment-gateway-service, transaction-service, fraud-detection-service, notification-service, reporting-service]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file microservices/${{ matrix.service }}/pom.xml

    # - name: SonarQube Scan
    #   uses: sonarsource/sonarqube-scan-action@master
    #   env:
    #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    #   with:
    #     projectBaseDir: microservices/${{ matrix.service }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }} microservices/${{ matrix.service }}
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Login to DockerHub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Docker Image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cicd_vind:${{ matrix.service }}${{ github.sha }}
      # docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest

  update-gitops:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/gitops-repo
        token: ${{ secrets.GITOPS_REPO_TOKEN }}

    - name: Update Image Tag in Helm Values
      run: |
        for service in user-service payment-gateway-service transaction-service fraud-detection-service notification-service reporting-service; do
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" charts/$service/values.yaml
        done
        git config --global user.email "devops@example.com"
        git config --global user.name "DevOps Architect"
        git add .
        git commit -m "Update image tags to ${{ github.sha }}"
        git push
