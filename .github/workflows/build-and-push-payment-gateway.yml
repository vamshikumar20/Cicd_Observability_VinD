name: Build and Push payment-gateway-service

on:
  push:
    # branches: [ main ] 
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v4
      with:
        context: ./microservices/payment-gateway-service
        file: ./microservices/payment-gateway-service/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/payment-gateway-service:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/payment-gateway-service:latest
        platforms: linux/amd64
